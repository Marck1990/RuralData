<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>RuralData</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>

<body>
  <main class="container py-4 home-container">

    <section class="text-center mb-4">
      <h1 class="fw-bold">RuralData</h1>
      <p class="text-muted">
        Gestión simple de animales, caravanas y sanidad rural.
      </p>
    </section>

    <section class="row g-3 mb-4">

      <div class="col-6">
        <div class="card text-center shadow-sm h-100">
          <div class="card-body d-flex flex-column justify-content-between">
            <div>
              <h5 id="totalAnimales" class="fw-bold">0</h5>
              <p class="mb-2 small">Animales</p>
            </div>

            <a href="pages/listar-animales.html" class="btn btn-outline-success btn-sm">
              Ver animales
            </a>
          </div>
        </div>
      </div>

      <div class="col-6">
        <div class="card text-center shadow-sm h-100">
          <div class="card-body d-flex flex-column justify-content-between">
            <div>
              <h5 id="totalSanidad" class="fw-bold">0</h5>
              <p class="mb-2 small">Controles</p>
            </div>

            <a href="pages/listar-controles.html" class="btn btn-outline-primary btn-sm">
              Ver controles
            </a>
          </div>
        </div>
      </div>

    </section>

    <section class="d-grid gap-3">

      <a href="pages/registrar-animal.html" class="btn btn-success btn-lg">
        Registrar animal
      </a>

      <a href="pages/buscar-animal.html" class="btn btn-outline-success btn-lg">
        Buscar caravana / RFID
      </a>

      <a href="pages/sanidad.html" class="btn btn-outline-primary btn-lg">
        Sanidad
      </a>

      <a href="pages/resumen.html" class="btn btn-outline-secondary btn-lg">
        Resumen
      </a>

    </section>

  </main>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
