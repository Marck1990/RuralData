<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sanidad - RuralData</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
  <main class="container py-4">

    <a href="../index.html" class="btn btn-outline-secondary mb-3">
      Volver
    </a>

    <h1 class="h3 fw-bold mb-3">Registro sanitario</h1>

    <form id="formSanidad" class="d-grid gap-3">

      <input
        type="text"
        id="identificadorAnimal"
        class="form-control"
        placeholder="Caravana o RFID del animal"
        required
      />

      <select id="tipoControl" class="form-select" required>
        <option value="">Tipo de control</option>
        <option value="Vacuna">Vacuna</option>
        <option value="Tratamiento">Tratamiento</option>
        <option value="Desparasitación">Desparasitación</option>
      </select>

      <input
        type="text"
        id="producto"
        class="form-control"
        placeholder="Producto aplicado"
        required
      />

      <label>Fecha de aplicación</label>
      <input
        type="date"
        id="fechaAplicacion"
        class="form-control"
        required
      />

      <label>Próxima fecha</label>
      <input
        type="date"
        id="fechaProxima"
        class="form-control"
      />

      <textarea
        id="observacionesSanidad"
        class="form-control"
        rows="3"
        placeholder="Observaciones"
      ></textarea>

      <button type="submit" class="btn btn-success btn-lg">
        Guardar control
      </button>

    </form>

  </main>

  <script src="../js/storage.js"></script>
  <script src="../js/sanidad.js"></script>
</body>
</html>
