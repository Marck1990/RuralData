<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Registrar animal - RuralData</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
  <main class="container py-4">

    <a href="../index.html" class="btn btn-outline-secondary mb-3">
      Volver
    </a>

    <h1 class="h3 fw-bold mb-3">Registrar animal</h1>

    <form id="formAnimal" class="d-grid gap-3">

      <input
        type="text"
        id="caravanaVisual"
        class="form-control"
        placeholder="Número de caravana visual"
      />

      <input
        type="text"
        id="codigoRFID"
        class="form-control"
        placeholder="Código RFID opcional"
      />

      <input
        type="text"
        id="propietario"
        class="form-control"
        placeholder="Propietario"
        required
      />

      <input
        type="text"
        id="campo"
        class="form-control"
        placeholder="Campo o establecimiento"
        required
      />

      <select id="categoria" class="form-select" required>
        <option value="">Categoría</option>
        <option value="Ternero">Ternero</option>
        <option value="Ternera">Ternera</option>
        <option value="Novillo">Novillo</option>
        <option value="Vaquillona">Vaquillona</option>
        <option value="Vaca">Vaca</option>
        <option value="Toro">Toro</option>
      </select>

      <select id="sexo" class="form-select" required>
        <option value="">Sexo</option>
        <option value="Hembra">Hembra</option>
        <option value="Macho">Macho</option>
      </select>

      <input
        type="text"
        id="raza"
        class="form-control"
        placeholder="Raza"
      />

      <select id="estado" class="form-select" required>
        <option value="Activo">Activo</option>
        <option value="Vendido">Vendido</option>
        <option value="Fallecido">Fallecido</option>
      </select>

      <textarea
        id="observaciones"
        class="form-control"
        rows="3"
        placeholder="Observaciones"
      ></textarea>

      <button type="submit" class="btn btn-success btn-lg">
        Guardar animal
      </button>

    </form>

  </main>

  <script src="../js/storage.js"></script>
  <script src="../js/identificacion.js"></script>
  <script src="../js/animales.js"></script>
</body>
</html>
